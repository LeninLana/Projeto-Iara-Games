<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro e consulta</title>

    <!-- **Link Google Fonts** -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=New+Amsterdam&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!--linkando html com css-->
    <link rel="stylesheet" href="../CSS/general-style.css">
    <link rel="stylesheet" href="../CSS/form-style.css">

</head>

<body>
    <nav class="nav-page">
        <h1>Iara
            <span class="nav-title-icon">
                <img src="../images/Vector.svg" alt="ícone de controle de vídeo game">
            </span>Games
        </h1>
        <nav>
            <ul class="nav-menu">
                <li><a href="../../index.html" class="item-menu" id="btn-jogos">Início</a></li>
                <li><a href="" class="item-menu">Loja</a></li>
            </ul>
        </nav>
    </nav>

    <!-- formulário de busca -->
    <div class="header-class">
        <h1>Criar conta</h1>
        <form id="form-search" class="form-search">
            <input type="search" id="text-search" name="text-search" class="text-search" placeholder="Digite o usuário"
                autofocus>
            <button type="submit" id="btn-search" class="btn-form">Buscar</button>
        </form>
    </div>
    <!-- fim formulário de busca -->

    <!--   formulário de cadastro   -->
    <main>
        <form id="form-cadastro" class="form-cadastro">
            <legend>Dados do usuário</legend>
            <section class="form-campos">
                <div class="span-2">
                    <label for="nome-usuario">Nome completo</label>
                    <div class="form-field">
                        <input type="text" name="nome-usuario" id="nome-usuario" required minlength="5" maxlength="50"
                            placeholder="Ex: Fulano de Tal" autocomplete="name">
                        <i class="bi bi-person-fill icon"></i>
                    </div>
                </div>
                <div>
                    <label for="email-usuario">E-mail</label>
                    <div class="form-field">
                        <input type="email" name="email-usuario" id="email-usuario" required maxlength="30"
                            placeholder="Ex: seuemail@email.com">
                        <i class="bi bi-at icon"></i>

                    </div>
                </div>

                <div>
                    <label for="data">Data de Nascimento</label>
                    <div class="form-field">
                        <input type="date" name="data" id="data" placeholder="dd/mm/aaaa" required>
                        <i class="bi bi-calendar icon"></i>

                    </div>
                </div>
                <div>
                    <label for="senha-usuario">Senha</label>
                    <div class="form-field">
                        <input type="password" name="senha-usuario" id="senha-usuario" required minlength="5"
                            maxlength="20" placeholder="Ex: @#$abcd&">
                        <i class="bi bi-key-fill icon"></i>
                    </div>
                </div>

                <div>
                    <label for="site-usuario">Site pessoal</label>
                    <div class="form-field">
                        <input type="url" name="site-usuario" id="site-usuario" placeholder="Ex: seusite@site.com.br">
                        <i class="bi bi-link-45deg icon"></i>
                    </div>
                </div>

                <div>
                    <label for="tel-usuario">Telefone</label>
                    <div class="form-field">
                        <input type="tel" name="tel-usuario" id="tel-usuario" required placeholder="Ex: (99) 9999-9999"
                            autocomplete="tel">
                        <i class="bi bi-telephone-fill icon"></i>
                    </div>
                </div>



                <div>
                    <label for="tipo-conta">Tipo de conta</label>
                    <div class="form-field">
                        <select name="tipo-conta" id="tipo-conta">
                            <option value="" disabled selected>Selecione sua conta</option>
                            <option value="Free">Free</option>
                            <option value="Premium">Premium</option>
                            <option value="Vip">Vip</option>
                        </select>
                        <i class="fa-solid fa-angle-down icon"></i>
                    </div>
                </div>
            </section>
            <div class="btn-submit-form-container">
                <a type="submit" id="criar-conta" class="btn-submit-form">
                    Criar conta
                </a>
            </div>
        </form>
    </main>

</body>

</html>
