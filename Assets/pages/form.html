<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro e consulta</title>

    <!-- **Link Google Fonts** -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

        <!--linkando html com css-->
    <link rel="stylesheet" href="../CSS/style.css">

</head>

<body>

    <!-- formulário de busca -->
    <header>
        <form id="form-search" name="form-search" method="get" action="" class="form-search">
            <input type="search" id="text-search" name="text-search" class="text-search" placeholder="Digite o usuário"
                autofocus required>
            <button type="submit" id="btn-search" name="btn-search" class="btn-form">Buscar</button>
        </form>
    </header>
    <!-- fim formulário de busca -->

    <!--   formulário de cadastro   -->
    <main>
        <form id="form-cadastro" name="form-cadastro" method="get" action="" class="form-cadastro">
            <fieldset>
                <legend>Dados do usuário</legend>
                <section class="form-campos">
                    <div class="span-2">
                        <label for="nome-usuario">Nome completo</label>
                        <div class="form-field">
                            <input type="text" name="nome-usuario" id="nome-usuario"
                            required minlength="5" maxlength="50"
                            placeholder="Ex: Fulano de Tal" autocomplete="name">
                            <i class="fa-regular fa-user icon"></i>
                        </div>
                    </div>

                    <div>
                        <label for="senha-usuario">Senha</label>
                        <div class="form-field">
                            <input type="password" name="senha-usuario" id="senha-usuario" required minlength="5" maxlength="20"
                                placeholder="Ex: @#$abcd&">
                            <i class="fa-solid fa-key icon"></i>
                        </div>
                    </div>

                    <div>
                        <label for="email-usuario">E-mail</label>
                        <div class="form-field">
                            <input type="email" name="email-usuario" id="email-usuario" required  maxlength="30" placeholder="Ex: seuemail@email.com">
                            <i class="fa-solid fa-at icon"></i>
                        </div>
                    </div>

                    <div>
                        <label for="tel-usuario">Telefone</label>
                        <div class="form-field">
                            <input type="tel" name="tel-usuario" id="tel-usuario" required 
                            placeholder="Ex: (99) 9999-9999" autocomplete="tel">
                            <i class="fa-solid fa-phone-flip icon"></i>
                        </div>
                    </div>

                    <div>
                        <label for="site-usuario">Site pessoal</label>
                        <div class="form-field">
                            <input type="url" name="site-usuario" id="site-usuario"  placeholder="Ex: seusite@site.com.br">
                            <i class="fa-solid fa-link icon"></i>
                        </div>
                    </div>

                    <div>
                        <label for="data">Data</label>
                        <div class="form-field">
                            <input type="date" name="data" id="data" required>
                            <i class="fa-regular fa-calendar icon"></i>
                        </div>
                    </div>

                    <div>
                        <label for="tipo-conta">Tipo de conta</label>
                        <div class="form-field">
                            <select name="tipo-conta" id="tipo-conta">
                                <option value="" disabled selected>Selecione sua conta</option>
                                <option value="Free">Free</option>
                                <option value="Premium">Premium</option>
                                <option value="Vip">Vip</option>
                            </select>
                            <i class="fa-solid fa-angle-down icon"></i>
                        </div>
                    </div>                    
                </section>
                <div class="btn-container">
                    <button type="submit" id="criar-conta" name="criar-conta" class="btn-form">
                        Criar conta <i class="fa-solid fa-rocket"></i>
                    </button>
                </div>
            </fieldset>
        </form>
    </main>
    <!-- fim formulário de cadastro -->
    <!-- máscara para telefone - qq coisa -->
    <script src="https://unpkg.com/imask"></script>
    <script src=".Assets/JS/telMask.js"></script>

</body>

</html>
